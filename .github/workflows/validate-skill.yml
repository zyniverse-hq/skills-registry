name: Validate Skill

on:
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'

permissions:
  contents: read

jobs:
  validate:
    name: Validate SKILL.md
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install pyyaml

      # Detect added/modified SKILL.md files under skills/<name>/ (excluding _template/).
      # Deletions (--diff-filter=AM excludes them) and template-only changes are treated
      # as maintainer work, not a skill submission, and skip the rest of the checks.
      - name: Detect skill submissions
        id: changed
        run: |
          CHANGED=$(git diff --name-only --diff-filter=AM origin/${{ github.base_ref }}...HEAD \
            | grep -E '^skills/[^_][^/]*/SKILL\.md$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No skill submissions detected (only deletions, template edits, or unrelated paths) — skipping skill checks."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Skill submissions detected:"
            echo "$CHANGED"
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGED" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Validate SKILL.md files
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          python3 scripts/validate_skill.py ${{ steps.changed.outputs.files }}
