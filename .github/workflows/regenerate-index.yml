name: Regenerate index.json

on:
  push:
    branches: [main]
    paths:
      - 'skills/**/SKILL.md'

# Only one regen run at a time. Queue rather than cancel so we never
# drop a merge — back-to-back skill PRs each get rebuilt in order.
concurrency:
  group: regenerate-index
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  regenerate:
    name: Rebuild skills[] from SKILL.md frontmatter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Fine-grained PAT (Contents: write) scoped to this repo.
          # Used because GITHUB_TOKEN runs as github-actions[bot], which
          # the main-branch ruleset blocks. The PAT inherits its owner's
          # bypass permission, so the push succeeds.
          # Loop safety: the `paths: skills/**/SKILL.md` trigger filter
          # excludes index.json, so the bot's commit doesn't re-trigger.
          token: ${{ secrets.REGEN_INDEX_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Regenerate index.json and push (race-safe)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in $(seq 1 5); do
            git fetch origin main
            git reset --hard origin/main
            python3 scripts/generate_index.py
            if git diff --quiet index.json; then
              echo "index.json already up to date — nothing to commit."; exit 0
            fi
            git add index.json
            git commit -m "chore: regenerate index.json from skills/"
            if git push origin HEAD:main; then echo "pushed (attempt $attempt)"; exit 0; fi
            echo "main moved; retrying ($attempt)"; sleep $((RANDOM % 5 + 2))
          done
          echo "::error::could not push regenerated index.json after 5 attempts"; exit 1
