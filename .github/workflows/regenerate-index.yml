name: Regenerate index.json

on:
  push:
    branches: [main]
    paths:
      - 'skills/**/SKILL.md'

# Only one regen run at a time. Queue rather than cancel so we never
# drop a merge — back-to-back skill PRs each get rebuilt in order.
concurrency:
  group: regenerate-index
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  regenerate:
    name: Rebuild skills[] from SKILL.md frontmatter
    runs-on: ubuntu-latest
    # Guard against bot-commit loops: skip if the push itself came from
    # this workflow's bot identity.
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN so the follow-up push is attributed
          # to github-actions[bot], which the `if:` above will then skip.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Regenerate index.json
        run: python3 scripts/generate_index.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet index.json; then
            echo "No changes to index.json — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.json
          git commit -m "chore: regenerate index.json from skills/"
          git push
