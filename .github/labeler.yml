# PR auto-labeler config — used by workflows/labeler.yml
# Maps file path patterns to labels. Only include high-signal mappings.
# Syntax: https://github.com/actions/labeler#create-configuration

"type: skill":
  - changed-files:
      - any-glob-to-any-file:
          - "skills/**"

"type: registry":
  - changed-files:
      - any-glob-to-any-file:
          - "index.json"
          - "website/**"
          - "scripts/**"
          - ".github/**"
