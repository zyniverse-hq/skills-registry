# Jekyll config for the GitHub Pages build of this registry.
#
# Skill docs frequently embed Jinja2 / Helm / Handlebars templates inside
# fenced code blocks. Jekyll's Liquid parser doesn't care about code fences
# and tries to evaluate any `{{ ... }}` / `{% ... %}` it sees, which broke
# the Pages build on the cloud-infra-planner Ansible templates.
#
# Disabling Liquid for `skills/**` removes that entire failure mode: skill
# markdown is treated as inert content, theme/layout still render via Liquid
# at the layout level.
defaults:
  - scope:
      path: "skills"
    values:
      render_with_liquid: false
